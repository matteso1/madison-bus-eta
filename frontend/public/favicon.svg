<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#0088cc"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="#080810"/>
  <g transform="translate(4,5)">
    <!-- Bus body -->
    <rect x="2" y="4" width="20" height="14" rx="3" fill="url(#g)"/>
    <!-- Windshield -->
    <rect x="4" y="6" width="7" height="6" rx="1.5" fill="#080810" opacity="0.7"/>
    <rect x="13" y="6" width="7" height="6" rx="1.5" fill="#080810" opacity="0.7"/>
    <!-- Bumper -->
    <rect x="3" y="17" width="18" height="2" rx="1" fill="#00d4ff" opacity="0.5"/>
    <!-- Wheels -->
    <circle cx="7" cy="20" r="2.2" fill="#1e1e2e"/>
    <circle cx="7" cy="20" r="1" fill="#00d4ff"/>
    <circle cx="17" cy="20" r="2.2" fill="#1e1e2e"/>
    <circle cx="17" cy="20" r="1" fill="#00d4ff"/>
    <!-- Headlights -->
    <rect x="19" y="8" width="2" height="2" rx="0.5" fill="#fff" opacity="0.9"/>
    <rect x="19" y="12" width="2" height="2" rx="0.5" fill="#f59e0b" opacity="0.9"/>
  </g>
</svg>
